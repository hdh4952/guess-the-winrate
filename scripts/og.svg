<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f2f2f" />
      <stop offset="1" stop-color="#1f1f1f" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- mini chessboard, right side -->
  <g transform="translate(760,135)">
    <rect x="-12" y="-12" width="384" height="384" rx="24" fill="#2a2a2a" stroke="#444" stroke-width="2" />
    <g>
      <rect x="0"   y="0"   width="90" height="90" fill="#f0d9b5" />
      <rect x="90"  y="0"   width="90" height="90" fill="#4a9d6a" />
      <rect x="180" y="0"   width="90" height="90" fill="#f0d9b5" />
      <rect x="270" y="0"   width="90" height="90" fill="#4a9d6a" />
      <rect x="0"   y="90"  width="90" height="90" fill="#4a9d6a" />
      <rect x="90"  y="90"  width="90" height="90" fill="#f0d9b5" />
      <rect x="180" y="90"  width="90" height="90" fill="#4a9d6a" />
      <rect x="270" y="90"  width="90" height="90" fill="#f0d9b5" />
      <rect x="0"   y="180" width="90" height="90" fill="#f0d9b5" />
      <rect x="90"  y="180" width="90" height="90" fill="#4a9d6a" />
      <rect x="180" y="180" width="90" height="90" fill="#f0d9b5" />
      <rect x="270" y="180" width="90" height="90" fill="#4a9d6a" />
      <rect x="0"   y="270" width="90" height="90" fill="#4a9d6a" />
      <rect x="90"  y="270" width="90" height="90" fill="#f0d9b5" />
      <rect x="180" y="270" width="90" height="90" fill="#4a9d6a" />
      <rect x="270" y="270" width="90" height="90" fill="#f0d9b5" />
    </g>
    <text x="180" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="bold" fill="#2a2a2a" text-anchor="middle">?</text>
  </g>

  <!-- left text block -->
  <text x="90" y="250" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#ffffff">Guess the</text>
  <text x="90" y="340" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#5fcf8e">Winrate</text>
  <text x="92" y="410" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#bbbbbb">Which chess opening wins more?</text>

  <!-- win-rate bars -->
  <g transform="translate(92,455)">
    <rect x="0" y="0" width="560" height="34" rx="8" fill="#3a3a3a" />
    <rect x="0" y="0" width="302" height="34" rx="8" fill="#5fcf8e" />
    <text x="14" y="24" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1f1f1f">54%</text>
    <text x="500" y="24" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#bbbbbb">46%</text>
  </g>
</svg>
